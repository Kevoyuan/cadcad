name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  core:
    name: Core CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: "file:./db/dev.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare database
        run: |
          mkdir -p db
          touch db/dev.db
          bun run db:generate
          bun run db:push

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

  openscad-integration:
    name: OpenSCAD Integration
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    env:
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: "file:./db/dev.db"
      OPENSCAD_BIN: "openscad"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSCAD and validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad xvfb python3 python3-pip
          python3 -m pip install --break-system-packages trimesh numpy scipy rtree

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare database
        run: |
          mkdir -p db
          touch db/dev.db
          bun run db:generate
          bun run db:push

      - name: Run OpenSCAD integration tests
        run: xvfb-run -a bun run test:openscad
